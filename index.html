<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GadgetLabs</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>GadgetLabs</h1>
    <p>Find Your Gadget by Product Code</p>
</header>

<section class="search-section">

    <input
    type="text"
    id="searchInput"
    placeholder="Enter Product Code (Example: GL001)"
    onkeypress="if(event.key==='Enter'){searchProduct();}"

    >

    <button onclick="searchProduct()">
        Search
    </button>

</section>

<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
